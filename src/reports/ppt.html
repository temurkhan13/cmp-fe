<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerPoint Slide</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .slide {
        width: 33.87cm;
        height: 19.05cm;
        box-sizing: border-box;
        padding: 1cm;
        border: 1px solid #ccc;
        margin: 0 auto;
        position: relative;
      }

      .page-content-one {
        background-color: #c3e11d;
        background-image: url('../../src/assets/dashboard/front-bg.svg');
        background-size: cover;
      }

      .logo {
        width: 100px;
        height: 100px;
        position: absolute;
        top: 20px;
        left: 20px;
      }

      .heading {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 2rem;
      }

      .content {
        font-size: 1.5rem;
        text-align: center;
      }

      .report-title {
        display: flex;
        font-size: 2rem;
        margin-top: 2rem;
        text-align: center;
        border-radius: 2rem;
        justify-content: center;
        background-color: #c3e11d;
      }
    </style>
  </head>
  <body>
    <div class="slide page-content-one">
      <img src="../../src/assets/dashboard/logo.svg" alt="Logo" class="logo" />
      <div class="heading">PowerPoint Slide Heading</div>
    </div>

    <div class="slide page-content-two">
      <div class="report-title">PowerPoint Report Title</div>
      <div class="content">
        <p>Additional slide content.</p>
      </div>
    </div>
  </body>
</html>
