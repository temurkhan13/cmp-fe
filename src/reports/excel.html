<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Sheet</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .sheet {
        width: 29.7cm;
        height: 21cm;
        box-sizing: border-box;
        padding: 1cm;
        border: 1px solid #ccc;
        margin: 0 auto;
        position: relative;
      }

      .page-content-one {
        background-color: #c3e11d;
        background-image: url('../../src/assets/dashboard/front-bg.svg');
        background-size: cover;
      }

      .logo {
        width: 100px;
        height: 100px;
        position: absolute;
        top: 20px;
        left: 20px;
      }

      .heading {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 2rem;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 100px;
      }

      .table th,
      .table td {
        border: 1px solid #000;
        padding: 0.5cm;
        text-align: left;
      }

      .report-title {
        display: flex;
        font-size: 2rem;
        margin-top: 2rem;
        text-align: center;
        border-radius: 2rem;
        align-items: center;
        justify-content: center;
        background-color: #c3e11d;
      }
    </style>
  </head>
  <body>
    <div class="sheet page-content-one">
      <img src="../../src/assets/dashboard/logo.svg" alt="Logo" class="logo" />
      <div class="heading">Excel Sheet Heading</div>
    </div>

    <div class="sheet page-content-two">
      <div class="report-title">Excel Report Title</div>
      <table class="table">
        <thead>
          <tr>
            <th>Header 4</th>
            <th>Header 5</th>
            <th>Header 6</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Data 4</td>
            <td>Data 5</td>
            <td>Data 6</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
