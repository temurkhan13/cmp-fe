          application/json:
            schema:
              example:
                companyName: zaini@gmail.com
                companySize: 8
                email: zainsoni99@gmail.com
                firstName: zaini@gmail.com
                industry: zaini@gmail.com
                jobTitle: zaini@gmail.com
                lastName: zaini@gmail.com
                password: password12@
