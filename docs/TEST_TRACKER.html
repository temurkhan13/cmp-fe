<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMP Frontend — Test Case Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f6fa;
      color: #1e1e2f;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0B1444;
    }

    .header p {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.25rem;
    }

    .stats-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      text-align: center;
      min-width: 100px;
    }

    .stat-box .num {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .stat-box .label {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-box.passed .num { color: #15803d; }
    .stat-box.failed .num { color: #dc2626; }
    .stat-box.blocked .num { color: #d97706; }
    .stat-box.nofeature .num { color: #7c3aed; }
    .stat-box.remaining .num { color: #2563eb; }

    .progress-container {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .progress-header span {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
    }

    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: #e9ecef;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
    }

    .progress-bar-bg .passed-fill {
      background: #15803d;
      height: 100%;
      transition: width 0.3s ease;
    }

    .progress-bar-bg .failed-fill {
      background: #dc2626;
      height: 100%;
      transition: width 0.3s ease;
    }

    .progress-bar-bg .blocked-fill {
      background: #d97706;
      height: 100%;
      transition: width 0.3s ease;
    }

    .progress-bar-bg .nofeature-fill {
      background: #7c3aed;
      height: 100%;
      transition: width 0.3s ease;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls input[type="text"] {
      padding: 0.5rem 0.75rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 0.85rem;
      width: 250px;
      outline: none;
    }

    .controls input[type="text"]:focus {
      border-color: #C3E11D;
      box-shadow: 0 0 0 2px rgba(195, 225, 29, 0.2);
    }

    .filter-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { background: #f0f0f0; }
    .filter-btn.active { background: #0B1444; color: #fff; border-color: #0B1444; }

    .action-btn {
      padding: 0.45rem 0.85rem;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }

    .action-btn.reset {
      background: #fee2e2;
      color: #dc2626;
    }

    .action-btn.reset:hover { background: #fecaca; }

    .action-btn.export {
      background: #dbeafe;
      color: #2563eb;
    }

    .action-btn.export:hover { background: #bfdbfe; }

    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 1.25rem;
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
      cursor: pointer;
      user-select: none;
    }

    .section-header:hover { background: #f5f5f5; }

    .section-header h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0B1444;
    }

    .section-badge {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .section-badge span {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-weight: 600;
    }

    .section-badge .count-passed { background: #dcfce7; color: #15803d; }
    .section-badge .count-total { background: #f1f5f9; color: #475569; }

    .section-body {
      padding: 0;
    }

    .section-body.collapsed { display: none; }

    .tc-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .tc-row:last-child { border-bottom: none; }
    .tc-row:hover { background: #fafafa; }

    .tc-row.status-passed { background: #f0fdf4; }
    .tc-row.status-failed { background: #fef2f2; }
    .tc-row.status-blocked { background: #fffbeb; }
    .tc-row.status-nofeature { background: #f5f3ff; }

    .tc-info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .tc-id {
      font-weight: 600;
      font-size: 0.82rem;
      color: #0B1444;
    }

    .tc-name {
      font-size: 0.78rem;
      color: #555;
    }

    .tc-tag {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-weight: 600;
      display: inline-block;
      margin-top: 0.15rem;
    }

    .tc-tag.happy { background: #dcfce7; color: #166534; }
    .tc-tag.negative { background: #fee2e2; color: #991b1b; }

    .status-select {
      padding: 0.35rem 0.5rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 0.78rem;
      background: #fff;
      cursor: pointer;
      min-width: 110px;
      outline: none;
    }

    .status-select:focus {
      border-color: #C3E11D;
    }

    .status-select.s-passed { background: #dcfce7; border-color: #86efac; color: #15803d; }
    .status-select.s-failed { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
    .status-select.s-blocked { background: #fef3c7; border-color: #fcd34d; color: #d97706; }
    .status-select.s-nofeature { background: #ede9fe; border-color: #c4b5fd; color: #7c3aed; }

    .notes-input {
      font-size: 0.75rem;
      padding: 0.3rem 0.5rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      width: 100%;
      margin-top: 0.3rem;
      outline: none;
      color: #555;
    }

    .notes-input:focus { border-color: #C3E11D; }

    .legend {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #666;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.passed { background: #15803d; }
    .legend-dot.failed { background: #dc2626; }
    .legend-dot.blocked { background: #d97706; }
    .legend-dot.nofeature { background: #7c3aed; }
    .legend-dot.untested { background: #d0d0d0; }

    .chevron {
      transition: transform 0.2s;
      font-size: 0.85rem;
      color: #999;
    }

    .chevron.open { transform: rotate(90deg); }

    .timestamp {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 0.15rem;
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .tc-row { grid-template-columns: 1fr; gap: 0.5rem; }
      .controls input[type="text"] { width: 100%; }
    }
  </style>
</head>

</div>

<div class="controls">

  <button class="filter-btn active" data-filter="all">All</button>

  <button class="action-btn export" onclick="exportCSV()">Export CSV</button>
  <button class="action-btn reset" onclick="resetAll()">Reset All</button>
</div>

<div class="legend">

  <div class="legend-item"><div class="legend-dot untested"></div> Untested</div>

  <div class="legend-item"><div class="legend-dot blocked"></div> Blocked</div>
</div>

<div id="sections-container"></div>

const STORAGE_KEY = "cmp_test_tracker";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// Merge seed into saved state (seed always wins so file edits take effect)
let state = loadState();
Object.entries(SEED_STATE).forEach(([k, v]) => {
  state[k] = v;
});
saveState(state);

let activeFilter = "all";
let searchQuery = "";

function getTotal() {
  return TEST_DATA.reduce((sum, s) => sum + s.tests.length, 0);
}

function getCounts() {
  const counts = { passed: 0, failed: 0, blocked: 0, nofeature: 0, untested: 0 };
  TEST_DATA.forEach(s => {
    s.tests.forEach(t => {
      const status = state[t.id]?.status || "untested";
      counts[status]++;
    });
  });
  return counts;
}

function updateStats() {
  const c = getCounts();
  const total = getTotal();
  const tested = c.passed + c.failed + c.blocked + c.nofeature;

  document.getElementById("subtitle").textContent = total + " test cases across " + TEST_DATA.length + " feature sections";
  document.getElementById("stat-passed").textContent = c.passed;
  document.getElementById("stat-failed").textContent = c.failed;
  document.getElementById("stat-blocked").textContent = c.blocked;
  document.getElementById("stat-nofeature").textContent = c.nofeature;
  document.getElementById("stat-remaining").textContent = c.untested;

  const pct = total > 0 ? Math.round((tested / total) * 100) : 0;
  document.getElementById("progress-pct").textContent = pct + "%";

  document.getElementById("bar-passed").style.width = ((c.passed / total) * 100) + "%";
  document.getElementById("bar-failed").style.width = ((c.failed / total) * 100) + "%";
  document.getElementById("bar-blocked").style.width = ((c.blocked / total) * 100) + "%";
  document.getElementById("bar-nofeature").style.width = ((c.nofeature / total) * 100) + "%";
}

function matchesFilter(testId) {
  const status = state[testId]?.status || "untested";
  if (activeFilter === "all") return true;
  return status === activeFilter;
}

function matchesSearch(test) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return test.id.toLowerCase().includes(q) || test.name.toLowerCase().includes(q);
}

function render() {
  const container = document.getElementById("sections-container");
  container.innerHTML = "";

  TEST_DATA.forEach((section, si) => {
    const visibleTests = section.tests.filter(t => matchesFilter(t.id) && matchesSearch(t));
    if (visibleTests.length === 0) return;

    const sectionPassed = section.tests.filter(t => (state[t.id]?.status || "untested") === "passed").length;
    const collapsed = state[`_section_${si}`]?.collapsed ?? false;

    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    sectionEl.innerHTML = `
      <div class="section-header" data-section="${si}">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <span class="chevron ${collapsed ? '' : 'open'}">&#9654;</span>
          <h2>${section.section}</h2>
        </div>
        <div class="section-badge">
          <span class="count-passed">${sectionPassed} passed</span>
          <span class="count-total">${section.tests.length} total</span>
        </div>
      </div>
      <div class="section-body ${collapsed ? 'collapsed' : ''}" id="body-${si}">
        ${visibleTests.map(t => {
          const s = state[t.id] || {};
          const status = s.status || "untested";
          const notes = s.notes || "";
          const ts = s.timestamp || "";
          return `
            <div class="tc-row status-${status}">
              <div class="tc-info">
                <span class="tc-id">${t.id}</span>
                <span class="tc-name">${t.name}</span>
                <span class="tc-tag ${t.type}">${t.type === 'happy' ? 'Happy Path' : 'Negative'}</span>
                ${ts ? `<span class="timestamp">Tested: ${ts}</span>` : ''}
              </div>
              <div>
                <input class="notes-input" type="text" placeholder="Notes (optional)..."
                  value="${notes.replace(/"/g, '&quot;')}" data-id="${t.id}" />
              </div>
              <select class="status-select ${status !== 'untested' ? 's-' + status : ''}" data-id="${t.id}">
                <option value="untested" ${status === 'untested' ? 'selected' : ''}>Untested</option>
                <option value="passed" ${status === 'passed' ? 'selected' : ''}>Passed</option>
                <option value="failed" ${status === 'failed' ? 'selected' : ''}>Failed</option>
                <option value="blocked" ${status === 'blocked' ? 'selected' : ''}>Blocked</option>
                <option value="nofeature" ${status === 'nofeature' ? 'selected' : ''}>No Feature</option>
              </select>
            </div>
          `;
        }).join('')}
      </div>
    `;

    container.appendChild(sectionEl);
  });

  // Bind section toggle
  document.querySelectorAll(".section-header").forEach(el => {
    el.addEventListener("click", () => {
      const si = el.dataset.section;
      const key = `_section_${si}`;
      const current = state[key]?.collapsed ?? false;
      state[key] = { collapsed: !current };
      saveState(state);
      render();
    });
  });

  // Bind status selects
  document.querySelectorAll(".status-select").forEach(el => {
    el.addEventListener("change", (e) => {
      const id = e.target.dataset.id;
      if (!state[id]) state[id] = {};
      state[id].status = e.target.value;
      if (e.target.value !== "untested") {
        state[id].timestamp = new Date().toLocaleString();
      } else {
        state[id].timestamp = "";
      }
      saveState(state);
      updateStats();
      render();
    });
  });

  // Bind notes inputs
  document.querySelectorAll(".notes-input").forEach(el => {
    el.addEventListener("input", (e) => {
      const id = e.target.dataset.id;
      if (!state[id]) state[id] = {};
      state[id].notes = e.target.value;
      saveState(state);
    });
  });

  updateStats();
}

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById("search").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  render();
});

// Reset all
function resetAll() {
  if (!confirm("Reset ALL test results? This cannot be undone.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {};
  render();
}

// Export CSV
function exportCSV() {
  let csv = "TC ID,Name,Type,Status,Notes,Tested At\n";
  TEST_DATA.forEach(section => {
    section.tests.forEach(t => {
      const s = state[t.id] || {};
      const status = s.status || "untested";
      const notes = (s.notes || "").replace(/"/g, '""');
      const ts = s.timestamp || "";
      csv += `"${t.id}","${t.name}","${t.type}","${status}","${notes}","${ts}"\n`;
    });
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `cmp_test_results_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Initial render
render();
